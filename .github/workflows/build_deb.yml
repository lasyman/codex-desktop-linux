name: Build deb package

on:
  workflow_dispatch:      # 手动触发，Actions 页面点 "Run workflow"
  push:
    tags:
      - 'v*'              # 打 tag 时自动触发，也可以删掉这段只保留手动触发

jobs:
  build-deb:
    runs-on: ubuntu-24.04    # deb 打包建议用较老的 LTS 保证兼容性
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- 缓存，减少重复下载 Electron / cargo / npm ----
      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/codex-desktop/electron
          key: electron-cache-${{ runner.os }}-${{ hashFiles('scripts/**') }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      # ---- 安装 Rust ----
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ---- 安装系统依赖（等价于 scripts/install-deps.sh 里 apt 分支的内容）----
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 p7zip-full curl unzip build-essential dpkg-dev

      # 如果 p7zip-full 版本太老（Ubuntu 22.04 常见），仓库自己的脚本会
      # 自动 bootstrap 一个更新的 7zz 到 ~/.local/bin，这里直接调用脚本即可：
      - name: Run project's own dependency bootstrap
        run: bash scripts/install-deps.sh

      # ---- 构建 Linux app（会下载上游 Codex.dmg）----
      - name: Build app from upstream DMG
        run: make build-app
        env:
          # 如果下载 Electron 运行时在 Actions 里被墙/很慢，可以加镜像：
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      # ---- 打包 deb ----
      - name: Build .deb package
        run: make deb

      # ---- 上传产物 ----
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-deb
          path: dist/codex-desktop_*.deb
          retention-days: 14

      # ---- 可选：打 tag 时自动发布 Release ----
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/codex-desktop_*.deb
